<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>001</title>
    <style>

        button{
            width: 150px;
            height: 60px;
        }
        body{
            text-align: center;
        }

    </style>
</head>
<body>
     <h1>Desafios da Mensagens</h1>
     <button type="button" class="botao">Botão #1</button>
     <button type="button" class="botao">Botão #2</button>
     <button type="button" class="botao">Botão #3</button>
    <script>
        let botao = document.getElementsByClassName('botao')
        botao[0].addEventListener('click', () => {
            alert('Você clicou no botão #1')
        })
        botao[1].addEventListener('click', () => {
            alert('Você clicou no botão #2')
        })
        botao[2].addEventListener('click', () => {
            alert('Você clicou no botão #3')
        })
    </script>
</body>
</html>
