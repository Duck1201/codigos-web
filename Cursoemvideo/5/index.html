<!doctype html>
<html lang="pt-BR" data-bs-theme="light">
    <head>
        <title>Web 12</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Analisador de números</h1>
        </header>
        <main>
            <section>
                <div id="d1">
                    <label for="num">Número(entre 1 e 100):</label>
                    <input type="number" id="num">
                    <button type="button" class="btn btn-secondary btn-sm" id="add">Adicionar</button>
                    <select name="valor" id="valor" size="10"></select>
                    <p><button type="button" class="btn btn-outline-success finalizar">Success</button></p>
                </div>
                <div id="conteudo">

                </div>
            </section>
        </main>
        <footer>
            &copy; Duck
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="script.js" defer></script>
    </body>
</html>
