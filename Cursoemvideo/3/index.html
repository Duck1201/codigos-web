<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Vamos Contar</h1>
    </header>
    <section>
        <div id="d1">
            <div>
                <label for="inicio">Início:</label>
                <input type="number" placeholder="Valor inicial" class="inputs">
            </div>
            <div>
                <label for="fim">Fim:</label>
                <input type="number" placeholder="Valor final" class="inputs">
            </div>
            <div>
                <label for="passo">Passo:</label>
                <input type="number" placeholder="Incremento" class="inputs">
            </div>
        </div>
        <div id="d2">
                <button type="button" id="contar">Contar</button>
            <p id="contagem">Preparando a contagem...</p>
        </div>
    </section>
    <footer>
        <p>&copy; Duck</p>
    </footer>
</body>
</html>
